services:
  postgres:
    image: postgres:16-alpine
    container_name: citadel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-citadel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-citadel_marketing}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-citadel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - citadel-net

  redis:
    image: redis:7-alpine
    container_name: citadel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - citadel-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: citadel-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../backend/app:/app/app
      - upload-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - citadel-net

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: citadel-worker
    env_file:
      - ../.env
    volumes:
      - ../backend/app:/app/app
      - upload-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A app.workers.celery_app worker -l info -c 4 -Q default,campaigns,imports
    networks:
      - citadel-net

  scheduler:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: citadel-scheduler
    env_file:
      - ../.env
    depends_on:
      worker:
        condition: service_started
    command: celery -A app.workers.celery_app beat -l info
    networks:
      - citadel-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: citadel-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - citadel-net

  nginx:
    image: nginx:alpine
    container_name: citadel-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - citadel-net

  prometheus:
    image: prom/prometheus:latest
    container_name: citadel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - citadel-net

volumes:
  pgdata:
  redis-data:
  upload-data:

networks:
  citadel-net:
    driver: bridge
