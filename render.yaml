services:
  # Backend API (uses SQLite — no separate database needed on free tier)
  - type: web
    name: citadel-marketing-platform
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://citadel-marketing-platform.onrender.com
      - key: FRONTEND_URL
        value: https://marketing.citadelcloudmanagement.com
      - key: UNSUBSCRIBE_BASE_URL
        value: https://citadel-marketing-platform.onrender.com/api/v1/unsubscribe
      - key: RESEND_FROM_EMAIL
        value: noreply@mail.citadelcloudmanagement.com
      - key: RESEND_FROM_NAME
        value: Citadel Cloud Management
      - key: COMPANY_NAME
        value: Citadel Cloud Management
      - key: COMPANY_ADDRESS
        value: United States
      - key: SEND_RATE_PER_MINUTE
        value: 60
      - key: MAX_DAILY_SENDS
        value: 5000
      - key: PYTHON_VERSION
        value: 3.13.14
    autoDeploy: false

  # Frontend
  - type: web
    name: citadel-marketing-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -s -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: VITE_API_URL
        value: https://citadel-marketing-platform.onrender.com
    autoDeploy: false
