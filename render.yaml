services:
  - type: web
    name: citadel-marketing-platform
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://citadel-marketing-platform.onrender.com
      - key: FRONTEND_URL
        value: https://marketing.citadelcloudmanagement.com
      - key: UNSUBSCRIBE_BASE_URL
        value: https://citadel-marketing-platform.onrender.com/api/v1/unsubscribe
      - key: RESEND_FROM_EMAIL
        value: noreply@mail.citadelcloudmanagement.com
      - key: RESEND_FROM_NAME
        value: Citadel Cloud Management
      - key: COMPANY_NAME
        value: Citadel Cloud Management
      - key: COMPANY_ADDRESS
        value: United States
      - key: SEND_RATE_PER_MINUTE
        value: 60
      - key: MAX_DAILY_SENDS
        value: 5000
      - key: PYTHON_VERSION
        value: 3.13.0

  - type: worker
    name: citadel-marketing-worker
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app worker -l info -c 2 -Q default,campaigns,imports
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_URL
        value: https://citadel-marketing-platform.onrender.com
      - key: UNSUBSCRIBE_BASE_URL
        value: https://citadel-marketing-platform.onrender.com/api/v1/unsubscribe
      - key: RESEND_FROM_EMAIL
        value: noreply@mail.citadelcloudmanagement.com

  - type: worker
    name: citadel-marketing-beat
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app beat -l info
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: APP_ENV
        value: production

  - type: web
    name: citadel-marketing-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -s -l $PORT
    autoDeploy: false
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: VITE_API_URL
        value: https://citadel-marketing-platform.onrender.com
