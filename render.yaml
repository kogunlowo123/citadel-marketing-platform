services:
  # Backend API
  - type: web
    name: citadel-marketing-platform
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: citadel-marketing-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://citadel-marketing-platform.onrender.com
      - key: FRONTEND_URL
        value: https://marketing.citadelcloudmanagement.com
      - key: UNSUBSCRIBE_BASE_URL
        value: https://citadel-marketing-platform.onrender.com/api/v1/unsubscribe
      - key: RESEND_FROM_EMAIL
        value: noreply@mail.citadelcloudmanagement.com
      - key: RESEND_FROM_NAME
        value: Citadel Cloud Management
      - key: COMPANY_NAME
        value: Citadel Cloud Management
      - key: COMPANY_ADDRESS
        value: United States
      - key: SEND_RATE_PER_MINUTE
        value: 60
      - key: MAX_DAILY_SENDS
        value: 5000
      - key: PYTHON_VERSION
        value: 3.13.14
    healthCheckPath: /api/v1/health
    autoDeploy: false

staticSites:
  # Frontend (static site)
  - type: web
    name: citadel-marketing-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /api/*
        destination: https://citadel-marketing-platform.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
    autoDeploy: false

databases:
  - name: citadel-marketing-db
    plan: starter
    databaseName: citadel_marketing
    user: citadel
